<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Varyant Fırın Cafe — Menü</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #faf9f7; color: #1a1a1a; min-height: 100vh; }

    #menu-page { display: block; }
    #admin-page { display: none; }

    .menu-wrap { max-width: 480px; margin: 0 auto; padding-bottom: 4rem; }
    .menu-header { text-align: center; padding: 2.5rem 1rem 1.5rem; border-bottom: 1px solid #e8e5df; }
    .menu-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 600; color: #1a1a1a; letter-spacing: 0.02em; margin-bottom: 4px; }
    .menu-header p { font-size: 12px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; }

    /* KAMPANYA BANNER */
    .campaign-banner { background: #fffbe6; border-bottom: 1px solid #f0e080; padding: 10px 1.25rem; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #7a6000; }
    .campaign-banner span { font-size: 16px; }

    .category-nav { display: flex; gap: 8px; justify-content: center; padding: 1.25rem 1rem; flex-wrap: wrap; }
    .cat-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 6px 16px; border-radius: 999px; border: 1px solid #d0cdc7; background: transparent; color: #666; cursor: pointer; transition: all 0.15s; }
    .cat-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    .section { padding: 0 1rem 2rem; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: #1a1a1a; margin: 1.5rem 0 1rem; padding-bottom: 8px; border-bottom: 1px solid #e8e5df; }

    /* KART GRID */
    .items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .item { display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; background: #fff; border: 1px solid #ede9e3; }
    .item.sold-out { opacity: 0.55; }

    .item-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #f0ede8; }
    .item-img-placeholder { width: 100%; aspect-ratio: 4/3; background: #f0ede8; display: flex; align-items: center; justify-content: center; font-size: 36px; }

    .item-body { padding: 10px 10px 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .item-name { font-size: 14px; font-weight: 500; color: #1a1a1a; line-height: 1.3; }
    .item-name.crossed { text-decoration: line-through; color: #aaa; }
    .item-desc { font-size: 11px; color: #999; line-height: 1.3; }
    .item-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 8px; }
    .item-price { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .sold-out-tag { display: inline-block; font-size: 10px; background: #f0ede8; color: #999; border-radius: 4px; padding: 2px 7px; letter-spacing: 0.04em; }

    .menu-footer { text-align: center; padding: 1.5rem 1rem 0.5rem; font-size: 11px; color: #bbb; }
    .admin-link { display: block; text-align: center; margin-top: 1rem; font-size: 11px; color: #ccc; cursor: pointer; }
    .admin-link:hover { color: #999; }
    .hidden { display: none !important; }

    /* ADMIN */
    .admin-wrap { max-width: 540px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e8e5df; }
    .admin-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500; }
    .back-btn { font-size: 13px; color: #888; background: none; border: none; cursor: pointer; padding: 6px 0; }
    .back-btn:hover { color: #1a1a1a; }

    .login-box { background: #fff; border: 1px solid #e8e5df; border-radius: 12px; padding: 2rem; max-width: 360px; margin: 3rem auto; }
    .login-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; text-align: center; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
    .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #e0ddd8; border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: #faf9f7; outline: none; transition: border-color 0.15s; }
    .form-group input:focus { border-color: #1a1a1a; }
    .login-btn, .save-btn { width: 100%; padding: 11px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.15s; }
    .login-btn:hover, .save-btn:hover { opacity: 0.85; }
    .error-msg { color: #c0392b; font-size: 13px; text-align: center; margin-top: 0.75rem; }

    .admin-section { margin-bottom: 2.5rem; }
    .admin-section-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 1px solid #e8e5df; }

    .admin-item { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid #f0ede8; flex-wrap: wrap; }
    .admin-item:last-child { border-bottom: none; }
    .admin-item input[type="text"] { flex: 1; min-width: 80px; padding: 7px 10px; border: 1px solid #e0ddd8; border-radius: 6px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: #faf9f7; outline: none; }
    .admin-item input[type="text"]:focus { border-color: #1a1a1a; }
    .price-input { max-width: 70px !important; flex: none !important; }

    .img-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; border: 1px solid #e0ddd8; flex-shrink: 0; }
    .img-placeholder { width: 48px; height: 48px; border-radius: 6px; background: #f0ede8; border: 1px dashed #d0cdc7; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
    .upload-btn { padding: 6px 10px; background: #f5f3f0; border: 1px solid #e0ddd8; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .upload-btn:hover { background: #eae7e2; }

    /* TÜKENDİ TOGGLE */
    .soldout-toggle { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .soldout-toggle label { font-size: 11px; color: #888; white-space: nowrap; }
    .toggle-switch { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #e0ddd8; border-radius: 999px; cursor: pointer; transition: background 0.2s; }
    .toggle-slider:before { content: ''; position: absolute; width: 12px; height: 12px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
    .toggle-switch input:checked + .toggle-slider { background: #c0392b; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(16px); }

    .del-btn { background: none; border: 1px solid #e0ddd8; border-radius: 6px; padding: 6px 10px; font-size: 13px; color: #c0392b; cursor: pointer; flex-shrink: 0; }
    .del-btn:hover { background: #fdf0ee; }

    .add-row { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; align-items: center; }
    .add-row input { flex: 1; min-width: 100px; padding: 8px 12px; border: 1px solid #e0ddd8; border-radius: 6px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: #faf9f7; outline: none; }
    .add-row input:focus { border-color: #1a1a1a; }
    .add-row button { padding: 8px 16px; background: #1a1a1a; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; }

    /* ADMIN AYARLAR KUTUSU */
    .settings-box { background: #fff; border: 1px solid #e8e5df; border-radius: 10px; padding: 1.25rem; margin-bottom: 2rem; }
    .settings-box h3 { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; margin-bottom: 1rem; }
    .settings-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .settings-row label { font-size: 12px; color: #888; min-width: 90px; text-transform: uppercase; letter-spacing: 0.04em; }
    .settings-row input[type="text"], .settings-row input[type="time"] { flex: 1; min-width: 100px; padding: 7px 10px; border: 1px solid #e0ddd8; border-radius: 6px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: #faf9f7; outline: none; }
    .settings-row input:focus { border-color: #1a1a1a; }
    .save-bar { position: sticky; bottom: 0; background: #faf9f7; border-top: 1px solid #e8e5df; padding: 1rem 0; margin-top: 2rem; }
    .saved-msg { text-align: center; font-size: 13px; color: #27ae60; margin-top: 8px; display: none; }

    input[type="file"] { display: none; }
  </style>
</head>
<body>

<!-- MENU PAGE -->
<div id="menu-page">
  <div class="menu-wrap">
    <div id="campaign-banner" class="campaign-banner hidden"><span>🎉</span><span id="campaign-text"></span></div>
    <div class="menu-header">
      <h1>Varyant Fırın Cafe</h1>
      <p>Dijital Menü</p>
    </div>
    <div class="category-nav">
      <button class="cat-btn active" onclick="filter('all', this)">Tümü</button>
      <button class="cat-btn" onclick="filter('ekmek', this)">Ekmek & Poğaça</button>
      <button class="cat-btn" onclick="filter('tatli', this)">Tatlılar & Pastalar</button>
      <button class="cat-btn" onclick="filter('icecek', this)">İçecekler</button>
    </div>
    <div id="menu-content"></div>
    <div class="menu-footer">Fiyatlarımız KDV dahildir</div>
    <span class="admin-link" onclick="showAdmin()">⚙</span>
  </div>
</div>

<!-- ADMIN PAGE -->
<div id="admin-page">
  <div class="admin-wrap">
    <div id="login-section">
      <div class="login-box">
        <h3>Yönetim Girişi</h3>
        <div class="form-group">
          <label>Şifre</label>
          <input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()" />
        </div>
        <button class="login-btn" onclick="doLogin()">Giriş Yap</button>
        <div class="error-msg" id="login-error"></div>
        <div style="text-align:center; margin-top:1rem;">
          <button class="back-btn" onclick="showMenu()">← Menüye Dön</button>
        </div>
      </div>
    </div>
    <div id="editor-section" style="display:none;">
      <div class="admin-header">
        <h2>Menü Yönetimi</h2>
        <button class="back-btn" onclick="showMenu()">← Menüye Dön</button>
      </div>

      <div class="settings-box">
        <h3>🎉 Günlük Kampanya</h3>
        <div class="settings-row">
          <label>Mesaj</label>
          <input type="text" id="s-campaign" placeholder="Örn: Bugün açmalar %20 indirimli!" />
        </div>
        <p style="font-size:11px;color:#aaa;margin-top:4px;">Boş bırakırsan banner görünmez.</p>
      </div>

      <div id="admin-content"></div>
      <div class="save-bar">
        <button class="save-btn" onclick="saveMenu()">Değişiklikleri Kaydet</button>
        <div class="saved-msg" id="saved-msg">✓ Menü güncellendi!</div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*" />

<script>
  const CLOUDINARY_CLOUD = 'dohzl28hq';
  const CLOUDINARY_PRESET = 'xvxkb1qk';
  const ADMIN_PASSWORD = 'varyant2024';
  const STORAGE_KEY = 'varyant_menu_v2';
  const SETTINGS_KEY = 'varyant_settings_v1';

  const DEFAULT_DATA = {
    ekmek: {
      title: 'Ekmek & Poğaça',
      items: [
        { name: 'Simit', desc: 'Günlük taze', price: '15', img: '', soldOut: false },
        { name: 'Peynirli Poğaça', desc: 'Fırından yeni çıkmış', price: '30', img: '', soldOut: false },
        { name: 'Zeytinli Poğaça', desc: 'Tam buğday hamuru', price: '30', img: '', soldOut: false },
        { name: 'Köy Ekmeği', desc: 'Taş fırın, 500g', price: '50', img: '', soldOut: false },
        { name: 'Açma', desc: 'Tereyağlı, günlük', price: '25', img: '', soldOut: false }
      ]
    },
    tatli: {
      title: 'Tatlılar & Pastalar',
      items: [
        { name: 'Çikolatalı Sufle', desc: 'Sıcak servis', price: '75', img: '', soldOut: false },
        { name: 'Cheesecake', desc: 'Mevsim meyveli', price: '85', img: '', soldOut: false },
        { name: 'Mozaik Pasta', desc: 'Dilim', price: '60', img: '', soldOut: false },
        { name: 'Fıstıklı Baklava', desc: 'Antep fıstığı', price: '70', img: '', soldOut: false }
      ]
    },
    icecek: {
      title: 'İçecekler',
      items: [
        { name: 'Türk Kahvesi', desc: 'Sade / az / orta / tatlı', price: '40', img: '', soldOut: false },
        { name: 'Çay', desc: 'Demlik çay', price: '20', img: '', soldOut: false },
        { name: 'Filtre Kahve', desc: 'Günlük öğütülmüş', price: '55', img: '', soldOut: false },
        { name: 'Limonata', desc: 'Taze sıkılmış', price: '50', img: '', soldOut: false },
        { name: 'Ayran', desc: 'Ev yapımı', price: '25', img: '', soldOut: false }
      ]
    }
  };

  const DEFAULT_SETTINGS = { campaign: '' };

  function loadData() {
    try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA)); }
    catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  }

  function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

  function loadSettings() {
    try { const s = localStorage.getItem(SETTINGS_KEY); return s ? { ...DEFAULT_SETTINGS, ...JSON.parse(s) } : { ...DEFAULT_SETTINGS }; }
    catch(e) { return { ...DEFAULT_SETTINGS }; }
  }

  function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

  // MENU RENDER
  function renderMenu() {
    const data = loadData();
    const settings = loadSettings();

    // Kampanya banner
    const campaignBanner = document.getElementById('campaign-banner');
    const campaignText = document.getElementById('campaign-text');
    if (settings.campaign && settings.campaign.trim()) {
      campaignText.textContent = settings.campaign;
      campaignBanner.classList.remove('hidden');
    } else {
      campaignBanner.classList.add('hidden');
    }

    const container = document.getElementById('menu-content');
    container.innerHTML = '';
    ['ekmek','tatli','icecek'].forEach(cat => {
      const sec = data[cat];
      const div = document.createElement('div');
      div.className = 'section';
      div.id = 'sec-' + cat;
      const items = sec.items.map(i => `
        <div class="item${i.soldOut ? ' sold-out' : ''}">
          ${i.img
            ? `<img class="item-img" src="${i.img}" alt="${i.name}" loading="lazy" />`
            : `<div class="item-img-placeholder">🍞</div>`}
          <div class="item-body">
            <div class="item-name${i.soldOut ? ' crossed' : ''}">${i.name}</div>
            ${i.desc ? `<div class="item-desc">${i.desc}</div>` : ''}
            <div class="item-footer">
              <div class="item-price">${i.price} ₺</div>
              ${i.soldOut ? `<span class="sold-out-tag">Tükendi</span>` : ''}
            </div>
          </div>
        </div>`).join('');
      div.innerHTML = `<div class="section-title">${sec.title}</div><div class="items-grid">${items}</div>`;
      container.appendChild(div);
    });
  }

  function filter(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (cat === 'all') {
      ['ekmek','tatli','icecek'].forEach(c => { const el = document.getElementById('sec-'+c); if(el) el.classList.remove('hidden'); });
    } else {
      ['ekmek','tatli','icecek'].forEach(c => { const el = document.getElementById('sec-'+c); if(el) el.classList.toggle('hidden', c !== cat); });
    }
  }

  // ADMIN
  function showAdmin() {
    document.getElementById('menu-page').style.display = 'none';
    document.getElementById('admin-page').style.display = 'block';
    document.getElementById('login-section').style.display = 'block';
    document.getElementById('editor-section').style.display = 'none';
    document.getElementById('pw-input').value = '';
    document.getElementById('login-error').textContent = '';
  }

  function showMenu() {
    document.getElementById('menu-page').style.display = 'block';
    document.getElementById('admin-page').style.display = 'none';
    renderMenu();
  }

  function doLogin() {
    if (document.getElementById('pw-input').value === ADMIN_PASSWORD) {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('editor-section').style.display = 'block';
      loadSettingsToForm();
      renderEditor();
    } else {
      document.getElementById('login-error').textContent = 'Şifre yanlış, tekrar deneyin.';
    }
  }

  function loadSettingsToForm() {
    const s = loadSettings();
    document.getElementById('s-campaign').value = s.campaign;
  }

  let editData = null;
  let pendingUpload = null;

  async function uploadToCloudinary(file) {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', CLOUDINARY_PRESET);
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method: 'POST', body: fd });
    const json = await res.json();
    return json.secure_url;
  }

  function triggerUpload(cat, idx) {
    pendingUpload = { cat, idx };
    document.getElementById('file-input').click();
  }

  document.getElementById('file-input').addEventListener('change', async function() {
    const file = this.files[0];
    if (!file || !pendingUpload) return;
    const { cat, idx } = pendingUpload;
    pendingUpload = null;
    this.value = '';
    const btn = document.getElementById(`upload-btn-${cat}-${idx}`);
    const origText = btn ? btn.textContent : '';
    if (btn) btn.textContent = 'Yükleniyor...';
    try {
      const url = await uploadToCloudinary(file);
      if (!editData) editData = loadData();
      editData[cat].items[idx].img = url;
      saveData(editData);
      renderEditor();
    } catch(e) {
      alert('Fotoğraf yüklenemedi, tekrar dene.');
      if (btn) btn.textContent = origText;
    }
  });

  function renderEditor() {
    const data = editData || loadData();
    editData = data;
    const container = document.getElementById('admin-content');
    container.innerHTML = '';
    ['ekmek','tatli','icecek'].forEach(cat => {
      const sec = data[cat];
      const div = document.createElement('div');
      div.className = 'admin-section';
      const rows = sec.items.map((item, i) => `
        <div class="admin-item">
          ${item.img
            ? `<img class="img-thumb" src="${item.img}" alt="${item.name}" />`
            : `<div class="img-placeholder" onclick="triggerUpload('${cat}',${i})">📷</div>`}
          <button class="upload-btn" id="upload-btn-${cat}-${i}" onclick="triggerUpload('${cat}',${i})">
            ${item.img ? 'Değiştir' : 'Fotoğraf'}
          </button>
          <input type="text" value="${item.name}" placeholder="Ürün adı" data-cat="${cat}" data-idx="${i}" data-field="name" onchange="updateItem(this)" />
          <input type="text" value="${item.desc}" placeholder="Açıklama" data-cat="${cat}" data-idx="${i}" data-field="desc" onchange="updateItem(this)" />
          <input type="text" class="price-input" value="${item.price}" placeholder="₺" data-cat="${cat}" data-idx="${i}" data-field="price" onchange="updateItem(this)" />
          <div class="soldout-toggle">
            <label class="toggle-switch">
              <input type="checkbox" ${item.soldOut ? 'checked' : ''} data-cat="${cat}" data-idx="${i}" onchange="toggleSoldOut(this)" />
              <span class="toggle-slider"></span>
            </label>
            <label style="font-size:11px;color:#888;">Tükendi</label>
          </div>
          <button class="del-btn" onclick="deleteItem('${cat}',${i})">Sil</button>
        </div>`).join('');
      div.innerHTML = `
        <div class="admin-section-title">${sec.title}</div>
        <div id="admin-items-${cat}">${rows}</div>
        <div class="add-row">
          <input type="text" id="new-name-${cat}" placeholder="Ürün adı" />
          <input type="text" id="new-desc-${cat}" placeholder="Açıklama" />
          <input type="text" id="new-price-${cat}" placeholder="Fiyat" style="max-width:70px" />
          <button onclick="addItem('${cat}')">+ Ekle</button>
        </div>`;
      container.appendChild(div);
    });
  }

  function toggleSoldOut(checkbox) {
    if (!editData) editData = loadData();
    const cat = checkbox.dataset.cat;
    const idx = parseInt(checkbox.dataset.idx);
    editData[cat].items[idx].soldOut = checkbox.checked;
  }

  function updateItem(input) {
    if (!editData) editData = loadData();
    editData[input.dataset.cat].items[parseInt(input.dataset.idx)][input.dataset.field] = input.value;
  }

  function deleteItem(cat, idx) {
    if (!editData) editData = loadData();
    editData[cat].items.splice(idx, 1);
    saveData(editData);
    renderEditor();
  }

  function addItem(cat) {
    if (!editData) editData = loadData();
    const name = document.getElementById('new-name-'+cat).value.trim();
    const desc = document.getElementById('new-desc-'+cat).value.trim();
    const price = document.getElementById('new-price-'+cat).value.trim();
    if (!name || !price) return alert('Ürün adı ve fiyat zorunludur.');
    editData[cat].items.push({ name, desc, price, img: '', soldOut: false });
    saveData(editData);
    renderEditor();
  }

  function saveMenu() {
    if (editData) saveData(editData);
    saveSettings({ campaign: document.getElementById('s-campaign').value.trim() });
    const msg = document.getElementById('saved-msg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2500);
    renderMenu();
  }

  renderMenu();
</script>
</body>
</html>
